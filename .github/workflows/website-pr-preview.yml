name: 🔍 Website PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'proposals/**'
      - 'docs/**'
      - 'reference/**'
      - 'studies/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'FEEDBACK.md'
      - 'mkdocs.yml'
      - '.github/workflows/website-*.yml'

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  build-preview:
    name: Build Preview Site
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install MkDocs & Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Validate MkDocs Configuration
        run: |
          echo "Validating mkdocs.yml configuration..."
          python3 -c "from mkdocs import config; cfg = config.load_config('mkdocs.yml'); print('✅ MkDocs configuration is valid')"

      - name: 📝 Configure Preview Build
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Update site_url for preview (if deploying to subdirectory)
          if [ -f mkdocs.yml ]; then
            echo "Configuring preview build for PR #${PR_NUMBER}..."
            # Add preview banner to configuration
            export PREVIEW_MODE=true
          fi

      - name: 📊 Gather Preview Statistics
        id: stats
        run: |
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "proposals=$(find proposals -name "*.md" -not -name "README.md" | wc -l)" >> $GITHUB_OUTPUT
          echo "pages=$(find . -name "*.md" | wc -l)" >> $GITHUB_OUTPUT
          echo "git_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_OUTPUT

      - name: 🔧 Build Preview Site
        env:
          PR_NUMBER: ${{ steps.stats.outputs.pr_number }}
        run: |
          echo "Building preview for PR #${PR_NUMBER}..."

          # Validate PR number is numeric (security: prevent injection)
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Error: Invalid PR number"
            exit 1
          fi

          mkdocs build --strict --verbose

          # Add preview banner to all pages (PR_NUMBER validated above)
          # Use robust sed that works regardless of body tag formatting
          BANNER="<div style=\\\"background:#ff9800;color:#000;padding:10px;text-align:center;font-weight:bold;\\\">📋 Preview Build - PR #${PR_NUMBER} | Not for production</div>"
          find site -name "*.html" -type f -exec sed -i "s|<body[^>]*>|&${BANNER}|" {} \;

      - name: 📦 Upload Preview Artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-site-pr-${{ steps.stats.outputs.pr_number }}
          path: site/
          retention-days: 7

      - name: 💬 Comment on PR with Preview Info
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.stats.outputs.pr_number }};
            const proposals = ${{ steps.stats.outputs.proposals }};
            const pages = ${{ steps.stats.outputs.pages }};
            const gitHash = '${{ steps.stats.outputs.git_hash }}';
            const buildTime = '${{ steps.stats.outputs.build_time }}';

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🔍 Website Preview Build')
            );

            const commentBody = `## 🔍 Website Preview Build

            ✅ **Preview site built successfully!**

            ### 📊 Build Information
            - **Proposals**: ${proposals}
            - **Total Pages**: ${pages}
            - **Commit**: \`${gitHash}\`
            - **Built**: ${buildTime}

            ### 📦 Preview Artifact
            The preview site has been built and is available as a workflow artifact for 7 days.

            To view the preview:
            1. Download the artifact \`preview-site-pr-${prNumber}\` from the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})
            2. Extract and open \`index.html\` in your browser
            3. Or deploy to a preview service (Netlify, Vercel, etc.)

            ### 🎯 Changes Included
            This preview reflects the latest changes in this PR. The site will automatically rebuild when new commits are pushed.

            ---
            *Preview builds help reviewers see documentation changes before merging. For security, previews are not automatically deployed.*`;

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }

      - name: 📊 Preview Build Summary
        run: |
          echo "## 🔍 Preview Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| PR Number | #${{ steps.stats.outputs.pr_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Proposals | ${{ steps.stats.outputs.proposals }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Pages | ${{ steps.stats.outputs.pages }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ steps.stats.outputs.git_hash }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | ${{ steps.stats.outputs.build_time }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Preview site built and artifact uploaded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Artifact**: \`preview-site-pr-${{ steps.stats.outputs.pr_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "⏳ **Retention**: 7 days" >> $GITHUB_STEP_SUMMARY

  validate-preview:
    name: Validate Preview Build
    needs: build-preview
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download Preview Site
        uses: actions/download-artifact@v4
        with:
          name: preview-site-pr-${{ github.event.pull_request.number }}
          path: preview-site/

      - name: 🔍 Validate Build Quality
        run: |
          echo "Validating preview build..."

          # Check for essential files
          if [ ! -f "preview-site/index.html" ]; then
            echo "❌ Missing index.html"
            exit 1
          fi

          if [ ! -d "preview-site/proposals" ]; then
            echo "⚠️ Warning: No proposals directory in build"
          fi

          # Check for broken internal links (basic check)
          broken_links=$(find preview-site -name "*.html" -type f -exec grep -o 'href="[^"]*404' {} \; | wc -l)
          if [ "$broken_links" -gt 0 ]; then
            echo "⚠️ Warning: Found $broken_links potential broken links"
          fi

          # Check for accessibility basics
          missing_alt=$(find preview-site -name "*.html" -type f -exec grep -o '<img[^>]*>' {} \; | grep -v 'alt=' | wc -l)
          if [ "$missing_alt" -gt 0 ]; then
            echo "⚠️ Warning: Found $missing_alt images without alt text"
          fi

          # Check file sizes (warn if too large)
          large_files=$(find preview-site -type f -size +5M)
          if [ -n "$large_files" ]; then
            echo "⚠️ Warning: Large files detected:"
            echo "$large_files"
          fi

          echo "✅ Preview validation complete"

      - name: 📊 Validation Summary
        run: |
          echo "## ✅ Preview Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All validation checks completed successfully." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Essential files present" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Structure validated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Quality checks passed" >> $GITHUB_STEP_SUMMARY
